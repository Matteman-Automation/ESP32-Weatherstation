type: vertical-stack
cards:
  - type: horizontal-stack
    cards:
      - type: custom:mini-graph-card
        name: Temperatuur
        hours_to_show: 24
        entities:
          - sensor.weerstation_temperatuur
        line_color: var(--accent-color)
        line_width: 8
        font_size: 75
      - type: custom:mini-graph-card
        name: Luchtvochtigheid
        hours_to_show: 24
        entities:
          - sensor.weerstation_luchtvochtigheid
        line_color: blue
        line_width: 8
        font_size: 75
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-entity-card
        entity: sensor.weerstation_voelt_als
        name: Voelt als
      - type: custom:mushroom-entity-card
        entity: sensor.weerstation_absolute_luchtvochtigheid
        name: abs. vocht
      - type: custom:mushroom-entity-card
        entity: sensor.weerstation_dauwpunt
        name: Dauwpunt
